name: Build matrix

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  legacy:
    name: Minecraft ${{ matrix.minecraft }} / Java 21
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        minecraft: ["1.21.1", "1.21.4", "1.21.8", "1.21.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew --no-daemon clean test build -Ptarget_mc=${{ matrix.minecraft }}

  modern:
    name: Minecraft ${{ matrix.minecraft }} / Java 25
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        minecraft: ["26.1", "26.1.2", "26.2"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew --no-daemon -p platform/modern clean test build -Ptarget_mc=${{ matrix.minecraft }}
